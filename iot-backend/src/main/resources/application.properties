spring.application.name=iot-backend
# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/iot_db
spring.datasource.username=iot_user
spring.datasource.password=iot_pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MQTT
mqtt.broker-url=ssl://localhost:8883
mqtt.client-id=spring-boot-backend
mqtt.username=iot-backend
mqtt.password=mqtt-backend-secret
mqtt.ca-cert-path=${MQTT_CA_CERT_PATH:}

# Server
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

#JWT
jwt.secret=your-super-secret-key-must-be-at-least-256-bits-long
jwt.expiration=900000
jwt.refresh-expiration=604800000